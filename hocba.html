<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学霸 HỌC BÁ — Tài liệu Chiến lược 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Ma+Shan+Zheng&display=swap');

  :root {
    --crimson:    #C0102A;
    --deep-red:   #8B0018;
    --gold:       #D4A235;
    --light-gold: #F0CE72;
    --pale-gold:  #FAF0CC;
    --cream:      #FEF9EE;
    --dark:       #2A0610;
    --ink:        #3A0D15;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'Noto Serif', 'Noto Serif SC', serif;
    overflow: hidden;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Decorative outer frame ── */
  #stage {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }

  /* ── Background lattice pattern ── */
  #stage::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg,   transparent, transparent 39px, rgba(212,162,53,.18) 40px),
      repeating-linear-gradient(90deg,  transparent, transparent 39px, rgba(212,162,53,.18) 40px);
    z-index: 0;
    pointer-events: none;
  }

  /* ── Corner ornaments ── */
  .corner {
    position: fixed;
    width: 120px; height: 120px;
    z-index: 100;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; }
  .c-tl { top: 0; left: 0; }
  .c-tr { top: 0; right: 0; transform: scaleX(-1); }
  .c-bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .c-br { bottom: 0; right: 0; transform: scale(-1); }

  /* ── Slide container ── */
  #slides-wrapper {
    position: absolute; inset: 0;
    z-index: 10;
  }

  .slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px 24px 64px;
    opacity: 0;
    pointer-events: none;
    transform: translateX(100%) scale(.94);
    transition: transform .65s cubic-bezier(.77,0,.18,1), opacity .65s ease;
  }
  .slide.active {
    will-change: transform, opacity;
  }

  .slide.active {
    opacity: 1; pointer-events: auto;
    transform: translateX(0) scale(1);
    will-change: auto;
  }
  .slide.prev  { transform: translateX(-100%) scale(.94); }
  .slide.enter { transform: translateX(100%)  scale(.94); }

  /* ── Inner card ── */
  .card {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(220,50,70,.35) 0%, transparent 60%),
      linear-gradient(160deg, rgba(175,18,40,.88) 0%, rgba(95,8,22,.94) 100%);
    border: 1px solid rgba(212,162,53,.7);
    box-shadow:
      0 0 0 4px rgba(212,162,53,.12),
      0 0 80px rgba(192,16,42,.4),
      inset 0 1px 0 rgba(255,255,255,.06),
      inset 0 0 60px rgba(0,0,0,.25);
    border-radius: 4px;
    width: 100%;
    height: 100%;
    max-height: calc(100vh - 80px);
    overflow: hidden;
    padding: 40px 60px 36px;
    position: relative;
    display: flex; flex-direction: column;
  }

  /* card inner border */
  .card::before {
    content: '';
    position: absolute; inset: 8px;
    border: 1px solid rgba(212,162,53,.5);
    border-radius: 2px;
    pointer-events: none;
  }

  /* ── Cover slide ── */
  .slide-cover .card {
    align-items: center; justify-content: center; text-align: center;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(220,40,65,.5) 0%, transparent 65%),
      radial-gradient(ellipse at 50% 100%, rgba(80,0,15,.6) 0%, transparent 60%),
      linear-gradient(170deg, rgba(165,15,35,.92) 0%, rgba(75,5,18,.97) 100%);
    padding: 48px 64px;
  }

  /* ── Logo wrapper ── */
  .cover-logo-wrap {
    position: relative;
    margin-bottom: 1.6em;
    display: flex; align-items: center; justify-content: center;
  }
  .cover-logo-glow {
    position: absolute;
    width: 340px; height: 180px;
    background: radial-gradient(ellipse, rgba(255,255,255,.18) 0%, rgba(212,162,53,.12) 40%, transparent 70%);
    border-radius: 50%;
    filter: blur(20px);
    pointer-events: none;
  }
  .cover-logo {
    position: relative;
    height: clamp(100px, 14vw, 160px);
    width: auto;
    mix-blend-mode: multiply;
    filter:
      drop-shadow(0 0 18px rgba(255,255,255,.55))
      drop-shadow(0 0 40px rgba(212,162,53,.5))
      drop-shadow(0 4px 12px rgba(0,0,0,.4));
    animation: logoFloat 4s ease-in-out infinite;
  }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }
  .cover-hanzi {
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    font-size: clamp(3.5rem, 8vw, 7.5rem);
    color: var(--light-gold);
    text-shadow: 0 0 40px rgba(201,146,42,.7), 0 2px 6px rgba(0,0,0,.8);
    letter-spacing: .2em;
    line-height: 1;
    margin-bottom: .15em;
  }
  .cover-latin {
    font-size: clamp(1.1rem, 2.5vw, 1.8rem);
    letter-spacing: .35em;
    color: var(--pale-gold);
    text-transform: uppercase;
    margin-bottom: 1.4em;
    font-weight: 700;
  }
  .cover-tagline {
    font-size: clamp(.85rem, 1.3vw, 1.05rem);
    color: rgba(255,242,200,.82);
    letter-spacing: .22em;
    text-transform: uppercase;
    margin-bottom: 2.2em;
  }
  .cover-divider {
    width: 260px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 2.4em;
  }
  .cover-title {
    font-size: clamp(1.05rem, 1.9vw, 1.4rem);
    color: #FDF8E8;
    line-height: 1.7;
    max-width: 700px;
    font-style: italic;
  }
  .cover-subtitle {
    margin-top: .6em;
    font-size: clamp(.75rem, 1.1vw, .9rem);
    color: rgba(255,242,200,.68);
    letter-spacing: .12em;
  }

  /* ── Regular slide header ── */
  .slide-label {
    font-size: .85rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: rgba(212,162,53,.75);
    margin-bottom: .5em;
    display: flex; align-items: center; gap: 10px;
  }
  .slide-label::before, .slide-label::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,146,42,.3));
  }
  .slide-label::after { background: linear-gradient(270deg, transparent, rgba(201,146,42,.3)); }

  .slide-headline {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(1.7rem, 3vw, 2.6rem);
    color: var(--light-gold);
    font-weight: 700;
    margin-bottom: .15em;
    text-shadow: 0 0 24px rgba(201,146,42,.4);
    line-height: 1.2;
  }
  .slide-subtitle {
    font-size: clamp(.95rem, 1.3vw, 1.15rem);
    color: rgba(201,146,42,.7);
    font-style: italic;
    margin-bottom: 1.2em;
    letter-spacing: .05em;
  }

  .gold-hr {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), rgba(201,146,42,.3), transparent);
    margin-bottom: 1.4em;
    flex-shrink: 0;
  }

  /* ── Scrollable body ── */
  .slide-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 14px;
    scrollbar-width: thin;
    scrollbar-color: rgba(201,146,42,.4) transparent;
  }
  .slide-body::-webkit-scrollbar { width: 5px; }
  .slide-body::-webkit-scrollbar-track { background: transparent; }
  .slide-body::-webkit-scrollbar-thumb { background: rgba(201,146,42,.4); border-radius: 2px; }

  .slide-body p {
    font-size: clamp(1rem, 1.35vw, 1.15rem);
    color: rgba(255,242,200,.92);
    line-height: 1.9;
    margin-bottom: 1em;
  }

  .slide-body h3 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(1.05rem, 1.5vw, 1.3rem);
    color: var(--light-gold);
    margin: 1.3em 0 .55em;
    font-weight: 600;
    display: flex; align-items: center; gap: 10px;
  }
  .slide-body h3::before {
    content: '◆';
    font-size: .55em;
    color: var(--gold);
    flex-shrink: 0;
  }

  .slide-body ul { list-style: none; padding-left: 0; margin-bottom: 1em; }
  .slide-body ul li {
    font-size: clamp(.97rem, 1.28vw, 1.1rem);
    color: rgba(255,242,200,.9);
    line-height: 1.8;
    padding: .35em 0 .35em 1.6em;
    position: relative;
  }
  .slide-body ul li::before {
    content: '—';
    position: absolute; left: 0;
    color: var(--gold);
    font-size: .9em;
  }

  blockquote {
    border-left: 3px solid var(--gold);
    margin: 1.3em 0;
    padding: 1em 1.5em;
    background: rgba(212,162,53,.1);
    border-radius: 0 2px 2px 0;
    font-style: italic;
    color: #FDF0C8;
    font-size: clamp(.97rem, 1.28vw, 1.1rem);
    line-height: 1.85;
  }

  /* ── Value cards (5-col) ── */
  .value-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin: 1em 0;
  }
  .value-card {
    background: rgba(201,146,42,.06);
    border: 1px solid rgba(201,146,42,.22);
    border-top: 3px solid var(--gold);
    padding: 18px 12px 14px;
    border-radius: 0 0 3px 3px;
    text-align: center;
    display: flex; flex-direction: column; align-items: center;
  }
  .value-icon {
    font-size: 1.6rem;
    margin-bottom: .5em;
    line-height: 1;
  }
  .value-name {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(.78rem, .95vw, .88rem);
    color: var(--light-gold);
    font-weight: 700;
    margin-bottom: .5em;
    line-height: 1.3;
  }
  .value-desc {
    font-size: clamp(.68rem, .82vw, .76rem);
    color: rgba(255,242,200,.78);
    line-height: 1.55;
  }

  /* ── Feature grid (2-col cards) ── */
  .feature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 1em 0;
  }
  .feature-grid.three-col { grid-template-columns: 1fr 1fr 1fr; }
  .feature-card {
    background: rgba(201,146,42,.05);
    border: 1px solid rgba(201,146,42,.2);
    border-left: 3px solid rgba(201,146,42,.6);
    padding: 14px 16px;
    border-radius: 0 3px 3px 0;
    display: flex; flex-direction: column; gap: 5px;
  }
  .feature-card.highlight { border-left-color: var(--gold); background: rgba(201,146,42,.09); }
  .fc-label {
    font-size: clamp(.62rem, .78vw, .72rem);
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(201,146,42,.55);
  }
  .fc-title {
    font-family: 'Noto Serif SC', serif;
    color: var(--light-gold);
    font-weight: 600;
    font-size: clamp(.88rem, 1.1vw, 1rem);
    line-height: 1.25;
  }
  .fc-body {
    color: rgba(255,242,200,.86);
    font-size: clamp(.78rem, .97vw, .88rem);
    line-height: 1.65;
  }

  /* ── Pipeline (numbered steps) ── */
  .pipeline {
    display: flex; flex-direction: column;
    gap: 8px; margin: .8em 0;
  }
  .pipeline-step {
    display: flex; align-items: flex-start; gap: 14px;
    background: rgba(201,146,42,.04);
    border: 1px solid rgba(201,146,42,.15);
    padding: 11px 16px; border-radius: 3px;
    position: relative;
  }
  .step-num {
    flex-shrink: 0;
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--gold), #a0721f);
    color: var(--dark);
    font-family: 'Noto Serif SC', serif;
    font-weight: 700; font-size: .85rem;
    display: flex; align-items: center; justify-content: center;
    border-radius: 2px;
    box-shadow: 0 2px 8px rgba(201,146,42,.3);
  }
  .step-content { flex: 1; }
  .step-title {
    color: var(--light-gold);
    font-weight: 600;
    font-size: clamp(.88rem, 1.1vw, 1rem);
    margin-bottom: .2em;
  }
  .step-desc {
    color: rgba(255,242,200,.86);
    font-size: clamp(.78rem, .95vw, .87rem);
    line-height: 1.6;
  }

  /* ── Segment chips (2-col) ── */
  .segment-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px; margin: .8em 0;
  }
  .seg-card {
    display: flex; align-items: flex-start; gap: 12px;
    background: rgba(201,146,42,.05);
    border: 1px solid rgba(201,146,42,.18);
    padding: 12px 14px; border-radius: 3px;
  }
  .seg-dot {
    flex-shrink: 0;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--gold);
    margin-top: .35em;
    box-shadow: 0 0 6px rgba(201,146,42,.5);
  }
  .seg-title {
    color: var(--light-gold);
    font-weight: 600;
    font-size: clamp(.85rem, 1.05vw, .95rem);
    margin-bottom: .2em;
  }
  .seg-desc {
    color: rgba(255,242,200,.82);
    font-size: clamp(.75rem, .9vw, .83rem);
    line-height: 1.55;
  }

  /* ── Task cards for Writing/Speaking ── */
  .task-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin: .8em 0;
  }
  .task-card {
    background: rgba(139,10,26,.35);
    border: 1px solid rgba(201,146,42,.22);
    border-radius: 3px;
    padding: 13px 14px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .task-badge {
    display: inline-flex; align-items: center;
    background: rgba(201,146,42,.2);
    border: 1px solid rgba(201,146,42,.4);
    color: var(--light-gold);
    font-size: .62rem;
    letter-spacing: .12em;
    padding: 2px 8px; border-radius: 2px;
    width: fit-content; margin-bottom: 2px;
  }
  .task-name {
    color: var(--light-gold);
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: clamp(.83rem, 1vw, .93rem);
    line-height: 1.25;
  }
  .task-desc {
    color: rgba(255,242,200,.8);
    font-size: clamp(.72rem, .88vw, .8rem);
    line-height: 1.6;
  }

  /* ── AI tiers (2x2 grid) ── */
  .ai-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px; margin: .8em 0;
  }
  .ai-card {
    background: rgba(139,10,26,.3);
    border: 1px solid rgba(201,146,42,.22);
    border-top: 3px solid rgba(201,146,42,.5);
    padding: 16px 18px;
    border-radius: 0 0 3px 3px;
  }
  .ai-tier {
    font-size: .68rem; letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(201,146,42,.55);
    margin-bottom: .4em;
  }
  .ai-title {
    font-family: 'Noto Serif SC', serif;
    color: var(--light-gold);
    font-weight: 700;
    font-size: clamp(.93rem, 1.2vw, 1.08rem);
    margin-bottom: .5em;
  }
  .ai-desc {
    color: rgba(255,242,200,.88);
    font-size: clamp(.8rem, 1vw, .9rem);
    line-height: 1.7;
  }

  /* ── Problem cards (numbered, warning-style) ── */
  .problem-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px; margin: .8em 0;
  }
  .problem-card {
    display: flex; align-items: flex-start; gap: 13px;
    background: rgba(139,10,26,.3);
    border: 1px solid rgba(201,146,42,.18);
    border-radius: 3px; padding: 12px 14px;
  }
  .prob-num {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border: 2px solid rgba(201,146,42,.5);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    font-size: .78rem;
    color: var(--gold);
  }
  .prob-title {
    color: var(--light-gold);
    font-weight: 600;
    font-size: clamp(.85rem, 1.05vw, .95rem);
    margin-bottom: .2em;
  }
  .prob-desc {
    color: rgba(255,242,200,.82);
    font-size: clamp(.75rem, .9vw, .83rem);
    line-height: 1.55;
  }

  /* ── Stats grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin: 1.2em 0;
  }
  .stat-box {
    background: rgba(201,146,42,.08);
    border: 1px solid rgba(201,146,42,.3);
    border-top: 2px solid rgba(201,146,42,.5);
    border-radius: 3px;
    padding: 22px 16px;
    text-align: center;
  }
  .stat-value {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(2rem, 3.5vw, 3rem);
    color: var(--light-gold);
    font-weight: 900;
    display: block;
    line-height: 1.1;
    text-shadow: 0 0 24px rgba(201,146,42,.6);
  }
  .stat-label {
    font-size: clamp(.8rem, 1vw, .95rem);
    color: rgba(255,242,200,.85);
    margin-top: .5em;
    line-height: 1.45;
    letter-spacing: .03em;
  }

  /* ── Moat layers ── */
  .moat-list { display: flex; flex-direction: column; gap: 10px; margin: 1em 0; }
  .moat-item {
    background: rgba(201,146,42,.06);
    border: 1px solid rgba(201,146,42,.2);
    border-left: 3px solid var(--gold);
    padding: 14px 20px;
    font-size: clamp(.97rem, 1.25vw, 1.1rem);
    color: rgba(255,242,200,.92);
    line-height: 1.7;
    border-radius: 0 2px 2px 0;
  }

  /* ── Phases ── */
  .phase-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin: 1em 0; }
  .phase-box {
    background: rgba(139,10,26,.3);
    border: 1px solid rgba(201,146,42,.25);
    border-top: 3px solid var(--gold);
    padding: 18px 14px;
    border-radius: 0 0 3px 3px;
  }
  .phase-tag {
    font-size: .8rem;
    letter-spacing: .18em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: .5em;
  }
  .phase-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(1rem, 1.3vw, 1.2rem);
    color: var(--light-gold);
    font-weight: 600;
    margin-bottom: .8em;
  }
  .phase-box ul { margin-bottom: 0; }

  /* ── Navigation ── */
  #nav {
    position: fixed;
    bottom: 32px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 24px;
    z-index: 200;
  }

  .nav-btn {
    background: rgba(139,10,26,.7);
    border: 1px solid var(--gold);
    color: var(--light-gold);
    width: 52px; height: 52px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    transition: background .25s, box-shadow .25s, transform .2s;
    backdrop-filter: blur(4px);
    box-shadow: 0 2px 20px rgba(0,0,0,.6);
  }
  .nav-btn:hover {
    background: rgba(180,20,40,.85);
    box-shadow: 0 0 18px rgba(201,146,42,.4);
    transform: translateY(-2px);
  }
  .nav-btn:active { transform: scale(.95); }
  .nav-btn:disabled { opacity: .3; cursor: default; transform: none; }

  #slide-counter {
    font-family: 'Noto Serif SC', serif;
    font-size: .78rem;
    letter-spacing: .22em;
    color: rgba(201,146,42,.7);
    text-transform: uppercase;
    min-width: 80px;
    text-align: center;
    user-select: none;
  }

  /* ── Dots ── */
  #dots {
    display: flex; gap: 6px;
    align-items: center;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(201,146,42,.3);
    transition: all .3s;
    cursor: pointer;
  }
  .dot.active { background: var(--gold); width: 18px; border-radius: 3px; }

  /* ── Top seal ── */
  #seal {
    position: fixed; top: 20px; right: 130px;
    z-index: 200;
    font-family: 'Ma Shan Zheng', serif;
    font-size: .85rem;
    color: rgba(201,146,42,.4);
    letter-spacing: .1em;
    pointer-events: none;
  }

  /* ── Slide-in animation for body text ── */
  .slide.active .card > * {
    animation: fadeUp .6s ease both;
  }
  .slide.active .card > *:nth-child(1) { animation-delay: .05s; }
  .slide.active .card > *:nth-child(2) { animation-delay: .12s; }
  .slide.active .card > *:nth-child(3) { animation-delay: .18s; }
  .slide.active .card > *:nth-child(4) { animation-delay: .24s; }
  .slide.active .card > *:nth-child(5) { animation-delay: .30s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

/* =====================================================
   RENDER ENGINE — only 3 slides in DOM at a time
   ===================================================== */
const wrapper = document.getElementById('slides-wrapper');
const prevBtn  = document.getElementById('prevBtn');
const nextBtn  = document.getElementById('nextBtn');
const counter  = document.getElementById('slide-counter');
const dotsEl   = document.getElementById('dots');

let current = 0;
let isAnimating = false;

// Build dots
slides.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(d);
});

function buildCard(s) {
  if (s.type === 'cover') {
    return `
      <div class="cover-logo-wrap">
        <div class="cover-logo-glow"></div>
        <img class="cover-logo" src="logo.png" alt="Học Bá Logo">
      </div>
      <div class="cover-tagline">${s.tagline}</div>
      <div class="cover-divider"></div>
      <div class="cover-title">${s.title}</div>
    `;
  }
  return `
    <div class="slide-label">${s.label}</div>
    <div class="slide-headline">${s.headline}</div>
    <div class="slide-subtitle">${s.subtitle}</div>
    <div class="gold-hr"></div>
    <div class="slide-body">${s.body}</div>
  `;
}

function renderSlide(idx) {
  const existing = wrapper.querySelector(`[data-idx="${idx}"]`);
  if (existing) return existing;

  const el = document.createElement('div');
  el.className = 'slide' + (slides[idx].type === 'cover' ? ' slide-cover' : '');
  el.dataset.idx = idx;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = buildCard(slides[idx]);
  el.appendChild(card);
  wrapper.appendChild(el);
  return el;
}

function cleanupDistant(cur) {
  wrapper.querySelectorAll('.slide').forEach(el => {
    const i = +el.dataset.idx;
    if (Math.abs(i - cur) > 1) el.remove();
  });
}

function updateDots(idx) {
  dotsEl.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
}

function updateCounter(idx) {
  const n = String(idx + 1).padStart(2, '0');
  const t = String(slides.length).padStart(2, '0');
  counter.textContent = `${n} / ${t}`;
}

function updateNav(idx) {
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === slides.length - 1;
}

function goTo(next) {
  if (isAnimating || next === current || next < 0 || next >= slides.length) return;
  isAnimating = true;

  const dir = next > current ? 1 : -1;
  const prev = current;

  // Only render the target slide now — neighbours deferred to after animation
  const newEl = renderSlide(next);
  const oldEl = wrapper.querySelector(`[data-idx="${prev}"]`);

  // Position new slide off-screen, then trigger animation in next frame
  newEl.classList.remove('active', 'prev', 'enter');
  newEl.classList.add('enter');
  newEl.getBoundingClientRect(); // force reflow

  if (oldEl) oldEl.classList.remove('active');
  if (oldEl) oldEl.classList.add(dir > 0 ? 'prev' : 'enter');
  newEl.classList.remove('enter');
  newEl.classList.add('active');

  current = next;
  updateDots(current);
  updateCounter(current);
  updateNav(current);

  setTimeout(() => {
    // Pre-render neighbours only after animation is done
    if (current > 0)                    renderSlide(current - 1);
    if (current < slides.length - 1)   renderSlide(current + 1);
    cleanupDistant(current);
    isAnimating = false;
  }, 720);
}

// Initial render
renderSlide(0);
renderSlide(1);
const first = wrapper.querySelector('[data-idx="0"]');
first.classList.add('active');
updateCounter(0);
updateNav(0);

prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
});

// Touch/swipe
let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) goTo(dx < 0 ? current + 1 : current - 1);
}, {passive:true});
</script>
